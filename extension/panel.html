<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 100%;
      font-family: -apple-system, sans-serif;
      font-size: 13px;
      color: #222;
      background: #fafafa;
    }
    .header {
      padding: 12px 16px;
      background: #1a1a2e;
      color: #fff;
      font-weight: 600;
      font-size: 14px;
    }
    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 6px;
    }
    .dot-ready { background: #22c55e; }
    .dot-awaiting { background: #eab308; }
    .dot-error { background: #ef4444; }
    .dot-unloaded { background: #9ca3af; }
    .dot-initializing { background: #3b82f6; }
    .plugin-list { padding: 8px 0; }
    .plugin-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 16px;
      border-bottom: 1px solid #eee;
    }
    .plugin-info {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .plugin-name { font-weight: 500; }
    .plugin-state { color: #888; font-size: 11px; }
    .confirm-btn {
      padding: 4px 12px;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }
    .confirm-btn:hover { background: #2563eb; }
    .message {
      padding: 4px 16px 8px;
      color: #666;
      font-size: 11px;
    }
    .empty {
      padding: 24px 16px;
      text-align: center;
      color: #999;
    }
  </style>
</head>
<body>
  <div class="header">Chrome Lite MCP</div>
  <div id="content" class="empty">Connecting...</div>
  <script src="panel.js"></script>
</body>
</html>
